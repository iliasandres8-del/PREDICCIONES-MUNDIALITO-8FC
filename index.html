<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 · Predicciones</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080f;
  --bg2:#090d18;
  --surface:#0e1420;
  --surface2:#131926;
  --surface3:#18202f;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --border3:rgba(255,255,255,0.2);
  --text:#e8eaf0;
  --muted:#5a6478;
  --muted2:#8090a8;
  --gold:#c9a84c;
  --gold2:#f0c040;
  --gold3:#fff0b0;
  --red:#cc2233;
  --red2:#e83344;
  --green:#22c55e;
  --green2:#16a34a;
  --font:'Barlow',sans-serif;
  --title:'Bebas Neue',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* ── HEADER ── */
.header{
  background:var(--bg2);
  border-bottom:1px solid rgba(201,168,76,0.25);
  position:sticky;top:0;z-index:200;
}
.header-inner{
  max-width:1400px;margin:0 auto;
  padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;
}
.logo{display:flex;align-items:center;gap:14px}
.logo-emblem{
  width:44px;height:44px;
  border:2px solid var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--title);font-size:13px;letter-spacing:.05em;
  color:var(--gold);
  flex-shrink:0;
}
.logo-text{}
.logo-top{font-family:var(--title);font-size:22px;letter-spacing:.1em;color:var(--text);line-height:1}
.logo-sub{font-size:10px;letter-spacing:.2em;color:var(--muted2);text-transform:uppercase;margin-top:1px}
.header-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px}
.htab{
  padding:7px 20px;border-radius:6px;
  font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;border:none;background:none;color:var(--muted2);
  transition:all .2s;
}
.htab:hover{color:var(--text)}
.htab.active{background:var(--gold);color:#06080e}

/* ── HERO BAND ── */
.hero{
  background:linear-gradient(180deg,rgba(201,168,76,0.06) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
  padding:20px 24px;
  max-width:1400px;margin:0 auto;
  display:flex;align-items:center;gap:32px;
}
.hero-stat{text-align:center;flex:1}
.hero-num{font-family:var(--title);font-size:36px;color:var(--gold2);letter-spacing:.05em;line-height:1}
.hero-label{font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-top:2px}
.hero-divider{width:1px;height:40px;background:var(--border2)}

/* ── LAYOUT ── */
.app-layout{display:grid;grid-template-columns:280px 1fr;max-width:1400px;margin:0 auto;min-height:calc(100vh - 64px)}
.sidebar{border-right:1px solid var(--border);padding:20px 16px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.main-area{padding:24px 28px}

/* ── SIDEBAR BITS ── */
.s-section-label{
  font-size:9px;font-weight:700;letter-spacing:.2em;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.s-section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.add-row{display:flex;gap:6px}
.add-input{
  flex:1;background:var(--surface2);border:1px solid var(--border2);
  border-radius:6px;color:var(--text);font-family:var(--font);font-size:14px;
  padding:9px 12px;outline:none;transition:border-color .15s;
}
.add-input:focus{border-color:var(--gold)}
.add-input::placeholder{color:var(--muted)}
.btn-add{
  width:38px;height:38px;background:var(--gold);border:none;border-radius:6px;
  color:#06080e;font-size:22px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;flex-shrink:0;
}
.btn-add:hover{opacity:.85}

.player-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .2s;
  position:relative;
}
.player-card:hover{border-color:var(--border2);background:var(--surface2)}
.player-card.active{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.05)}
.player-card.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.player-avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;flex-shrink:0;color:#06080e;
  font-family:var(--title);letter-spacing:.04em;
}
.player-name{flex:1;font-size:15px;font-weight:700;letter-spacing:.02em}
.player-pts{font-family:var(--mono);font-size:12px;color:var(--gold);padding:2px 8px;background:rgba(201,168,76,.1);border-radius:4px}
.player-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 5px;border-radius:4px;display:none;line-height:1}
.player-card:hover .player-del{display:block}
.player-del:hover{color:var(--red2)}

.no-players{text-align:center;padding:24px 12px;color:var(--muted);font-size:13px}

/* scoring box */
.score-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.score-box-title{font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;color:var(--text)}
.score-row:last-child{margin-bottom:0}
.badge-pts{font-family:var(--mono);font-size:11px;font-weight:500;padding:3px 9px;border-radius:4px}
.badge-exact{background:rgba(201,168,76,.15);color:var(--gold2);border:1px solid rgba(201,168,76,.25)}
.badge-win{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.badge-zero{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}

/* ── TABS CONTENT ── */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── DAY GROUP ── */
.day-block{margin-bottom:32px}
.day-header{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
  padding:10px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
}
.day-icon{font-size:18px}
.day-name{font-family:var(--title);font-size:20px;letter-spacing:.08em;color:var(--text)}
.day-count{font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono)}

/* ── MATCH CARD ── */
.match-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin-bottom:10px;overflow:hidden;
  transition:border-color .2s;
}
.match-card:hover{border-color:var(--border2)}
.match-card.settled{border-left:3px solid var(--green2)}

.match-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.match-group-tag{
  font-size:10px;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;padding:2px 10px;border-radius:20px;
  background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2);
}
.match-time{font-family:var(--mono);font-size:11px;color:var(--muted)}

.match-body{
  display:flex;align-items:center;gap:0;padding:16px;
}
.team-side{flex:1;display:flex;align-items:center;gap:12px}
.team-side.right{flex-direction:row-reverse}
.team-flag{font-size:30px;line-height:1;flex-shrink:0}
.team-info{}
.team-name{font-family:var(--title);font-size:22px;letter-spacing:.06em;color:var(--text);line-height:1}
.team-side.right .team-info{text-align:right}

.center-zone{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:0 16px;
}
.vs-label{font-family:var(--title);font-size:12px;letter-spacing:.15em;color:var(--muted);line-height:1}

.score-inputs{display:flex;align-items:center;gap:6px}
.s-input{
  width:46px;height:46px;text-align:center;
  font-family:var(--mono);font-size:22px;font-weight:500;
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);outline:none;
  transition:border-color .15s;
}
.s-input:focus{border-color:var(--gold)}
.s-input::-webkit-outer-spin-button,.s-input::-webkit-inner-spin-button{-webkit-appearance:none}
.s-dash{font-family:var(--mono);font-size:18px;color:var(--muted)}
.score-type-label{font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;text-align:center}

.btn-save-pred{background:var(--gold);border:none;border-radius:6px;color:#06080e;font-family:var(--font);font-weight:700;font-size:11px;letter-spacing:.04em;padding:5px 14px;cursor:pointer;margin-top:2px;transition:opacity .15s}
.btn-save-pred:hover{opacity:.85}
.btn-save-pred:disabled{opacity:.3;cursor:default}

.real-block{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:4px 10px;text-align:center;
}
.real-score-line{display:flex;align-items:center;gap:6px;justify-content:center}
.rs{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--text);width:24px;text-align:center}
.rs-dash{color:var(--muted);font-family:var(--mono)}
.real-inputs{display:flex;align-items:center;gap:4px;justify-content:center}
.ri{
  width:38px;height:38px;text-align:center;
  font-family:var(--mono);font-size:18px;font-weight:500;
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:6px;color:var(--text);outline:none;
  transition:border-color .15s;
}
.ri:focus{border-color:var(--green)}
.ri::-webkit-outer-spin-button,.ri::-webkit-inner-spin-button{-webkit-appearance:none}
.ri-dash{color:var(--muted);font-family:var(--mono)}

/* ── PREDICTIONS CHIPS ── */
.preds-row{
  display:flex;flex-wrap:wrap;gap:6px;
  padding:10px 16px;border-top:1px solid var(--border);
  background:var(--bg2);
}
.pred-chip{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  border:1px solid var(--border2);background:var(--surface2);
  font-size:12px;font-weight:600;letter-spacing:.02em;
  transition:all .15s;
}
.pred-chip.hit-exact{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.1);color:var(--gold2)}
.pred-chip.hit-win{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08);color:var(--green)}
.pred-chip.miss{opacity:.4}
.chip-avatar{
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#06080e;flex-shrink:0;
  font-family:var(--title);
}
.chip-score{font-family:var(--mono);font-size:11px}
.chip-pts{
  font-family:var(--mono);font-size:10px;font-weight:700;
  padding:1px 5px;border-radius:3px;
}
.chip-pts.p3{background:var(--gold2);color:#06080e}
.chip-pts.p1{background:var(--green);color:#06080e}
.chip-none{color:var(--muted);font-size:11px;font-family:var(--mono)}

/* ── MY PRED HIGHLIGHT ── */
.my-pred-banner{
  background:rgba(201,168,76,.06);border-top:1px solid rgba(201,168,76,.15);
  padding:8px 16px;display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:600;
}
.my-pred-label{color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.12em}
.my-pred-score{font-family:var(--mono);font-size:16px;color:var(--gold2)}

/* ── ACTIVE USER INDICATOR ── */
.active-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);
  border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;
  color:var(--gold2);letter-spacing:.04em;margin-bottom:16px;
}
.active-dot{width:6px;height:6px;border-radius:50%;background:var(--gold2)}

/* ── LEADERBOARD ── */
.lb-wrap{max-width:640px}
.lb-podium{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:12px;margin-bottom:24px;align-items:end}
.podium-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:16px 12px;text-align:center;
  transition:all .2s;
}
.podium-card.p1{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.04)}
.podium-card.p2{border-color:rgba(192,192,192,.3)}
.podium-card.p3{border-color:rgba(205,127,50,.3)}
.podium-medal{font-size:28px;margin-bottom:8px}
.podium-avatar{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--title);font-size:22px;color:#06080e;
  margin:0 auto 8px;
}
.podium-name{font-size:15px;font-weight:700;letter-spacing:.02em;margin-bottom:4px}
.podium-pts{font-family:var(--mono);font-size:26px;color:var(--gold2);line-height:1}
.podium-pts-label{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.podium-detail{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px}

.lb-list{display:flex;flex-direction:column;gap:8px}
.lb-row{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;
}
.lb-rank{font-family:var(--title);font-size:20px;color:var(--muted);width:28px;text-align:center;flex-shrink:0}
.lb-av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--title);font-size:17px;color:#06080e;
}
.lb-name{flex:1;font-size:16px;font-weight:700}
.lb-sub{font-size:11px;color:var(--muted);font-family:var(--mono)}
.lb-score{font-family:var(--mono);font-size:22px;color:var(--gold2)}

/* ── EMPTY ── */
.empty{text-align:center;padding:64px 20px;color:var(--muted)}
.empty-icon{font-size:56px;margin-bottom:12px}
.empty-msg{font-size:16px;font-weight:600;letter-spacing:.02em}
.empty-sub{font-size:13px;margin-top:6px}

/* ── SCROLLBAR GLOBAL ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:900px){
  .app-layout{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .lb-podium{grid-template-columns:1fr}
}

/* ── AUTH OVERLAY ── */
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-overlay.hidden{display:none}
.auth-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.auth-emblem{width:56px;height:56px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--title);font-size:16px;color:var(--gold);margin:0 auto 16px}
.auth-title{font-family:var(--title);font-size:26px;letter-spacing:.08em;text-align:center;color:var(--text)}
.auth-sub{font-size:13px;color:var(--muted2);text-align:center;margin-top:4px;margin-bottom:24px}
.auth-field{margin-bottom:14px}
.auth-label{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:block}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;padding:11px 14px;outline:none;transition:border-color .15s}
.auth-input:focus{border-color:var(--gold)}
.auth-btn{width:100%;background:var(--gold);border:none;border-radius:8px;color:#06080e;font-family:var(--font);font-weight:700;font-size:14px;letter-spacing:.04em;padding:12px;cursor:pointer;margin-top:6px;transition:opacity .15s}
.auth-btn:hover{opacity:.88}
.auth-btn:disabled{opacity:.5;cursor:default}
.auth-switch{text-align:center;font-size:13px;color:var(--muted2);margin-top:18px}
.auth-switch a{color:var(--gold2);cursor:pointer;font-weight:700;text-decoration:none}
.auth-error{background:rgba(204,34,51,.1);border:1px solid rgba(204,34,51,.3);color:#ff8a93;font-size:12px;border-radius:6px;padding:9px 12px;margin-bottom:14px;display:none}
.auth-error.show{display:block}

.s-input:disabled{opacity:.55;cursor:not-allowed}
.pred-save-btn{
  margin-top:2px;background:var(--gold);border:none;border-radius:6px;
  color:#06080e;font-family:var(--font);font-weight:700;font-size:11px;
  letter-spacing:.03em;padding:6px 14px;cursor:pointer;transition:opacity .15s;
}
.pred-save-btn:disabled{opacity:.3;cursor:default}
.pred-save-btn:not(:disabled):hover{opacity:.85}
.pred-locked-msg{
  margin-top:2px;font-size:11px;color:var(--green);font-weight:700;
  display:flex;align-items:center;gap:4px;
}

.user-box{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface)}
.user-box-name{flex:1;font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{background:none;border:1px solid var(--border2);color:var(--muted2);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:6px 10px;border-radius:6px;cursor:pointer;flex-shrink:0}
.logout-btn:hover{color:var(--red2);border-color:rgba(204,34,51,.4)}

/* ── CALENDARIO ── */
.cal-title{font-family:var(--title);font-size:24px;letter-spacing:.08em;color:var(--text);margin-bottom:18px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}
.cal-wd{text-align:center;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;max-width:640px}
.cal-cell{aspect-ratio:1/1;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;transition:all .2s}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.no-matches{opacity:.35}
.cal-cell.has-matches{cursor:pointer;border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.06)}
.cal-cell.has-matches:hover{border-color:var(--gold);background:rgba(201,168,76,.14);transform:translateY(-2px)}
.cal-cell.is-today{border-color:var(--green2);box-shadow:0 0 0 2px rgba(34,197,94,.25) inset}
.cal-daynum{font-family:var(--title);font-size:22px;color:var(--text);line-height:1}
.cal-count{font-family:var(--mono);font-size:9px;color:var(--gold2);letter-spacing:.02em;text-align:center}
.cal-today-badge{position:absolute;top:4px;right:4px;font-size:8px;font-weight:700;letter-spacing:.08em;color:var(--green);background:rgba(34,197,94,.15);border-radius:4px;padding:1px 4px}

@media(max-width:900px){
  .cal-daynum{font-size:16px}
  .cal-count{font-size:7px}
}
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-emblem">2026</div>
    <div class="auth-title" id="authTitle">Iniciar sesión</div>
    <div class="auth-sub">Predicciones del Mundial entre amigos</div>
    <div class="auth-error" id="authError"></div>
    <form id="authForm" onsubmit="return handleAuthSubmit(event)">
      <div class="auth-field" id="nameField" style="display:none">
        <label class="auth-label">Tu nombre</label>

function winner(h,a){return h>a?'H':a>h?'A':'D'}
function calcPts(mid,fid){
  const r=results[mid],p=preds[mid]?.[fid];
  if(!r||!p||r.h===''||r.a===''||p.h===''||p.a==='') return null;
  if(+p.h===+r.h&&+p.a===+r.a) return 3;
  if(winner(+p.h,+p.a)===winner(+r.h,+r.a)) return 1;
  return 0;
}
function totals(fid){
  let pts=0,ex=0,win=0;
  MATCHES.forEach(m=>{const p=calcPts(m.id,fid);if(p===3){pts+=3;ex++}else if(p===1){pts+=1;win++}});
  return{pts,ex,win};
}

let authMode='login';

function toggleAuthMode(){
  authMode = authMode==='login' ? 'register' : 'login';

  document.getElementById('authTitle').textContent = authMode==='register' ? 'Crear cuenta' : 'Iniciar sesión';

    ? '¿Ya tienes cuenta? <a onclick="toggleAuthMode()">Inicia sesión</a>'
    : '¿No tienes cuenta? <a onclick="toggleAuthMode()">Crear una</a>';
  hideAuthError();
}

function showAuthError(msg){
  const el=document.getElementById('authError');
  el.textContent=msg;
  el.classList.add('show');
}
function hideAuthError(){document.getElementById('authError').classList.remove('show')}

function translateAuthError(code){
  const map={
    'auth/email-already-in-use':'Ese correo ya tiene una cuenta. Inicia sesión.',
    'auth/invalid-email':'Correo inválido.',
    'auth/weak-password':'La contraseña necesita al menos 6 caracteres.',
    'auth/user-not-found':'No existe una cuenta con ese correo.',
    'auth/wrong-password':'Contraseña incorrecta.',
    'auth/invalid-credential':'Correo o contraseña incorrectos.',
    'auth/too-many-requests':'Demasiados intentos. Espera un momento.',
    'permission-denied':'No tienes permiso para hacer esto. Revisa las reglas de Firestore.',
  };
  return map[code]||'Algo salió mal, intenta de nuevo.';
}

async function getNextColor(){
  const snap=await db.collection('users').get();
  return COLORS[snap.size%COLORS.length];
}

async function handleAuthSubmit(e){
  e.preventDefault();
  hideAuthError();
  const email=document.getElementById('authEmail').value.trim();
  const password=document.getElementById('authPassword').value;
  const name=document.getElementById('authName').value.trim();
  const btn=document.getElementById('authSubmitBtn');
  btn.disabled=true;
  try{
    if(authMode==='register'){
      if(!name){showAuthError('Escribe tu nombre');btn.disabled=false;return false}
      const cred=await auth.createUserWithEmailAndPassword(email,password);
      const color=await getNextColor();
      await db.collection('users').doc(cred.user.uid).set({
        name,color,email,createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }else{
      await auth.signInWithEmailAndPassword(email,password);
    }
  }catch(err){
    console.error('Auth error:',err);
    showAuthError(translateAuthError(err.code));
  }
  btn.disabled=false;
  return false;
}

function handleLogout(){auth.signOut()}

function attachDataListeners(){
  unsubUsers=db.collection('users').onSnapshot(snap=>{
    friends=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    renderAll();
  });
  unsubPreds=db.collection('predictions').onSnapshot(snap=>{
    const np={};
    snap.forEach(doc=>{
      const d=doc.data();
      if(!np[d.matchId])np[d.matchId]={};
      np[d.matchId][d.uid]={h:d.h,a:d.a};
    });
    preds=np;
    renderAll();
  });
  unsubResults=db.collection('results').onSnapshot(snap=>{
    const nr={};
    snap.forEach(doc=>{nr[doc.id]=doc.data()});
    results=nr;
    renderAll();
  });
}

function detachDataListeners(){
  if(unsubUsers)unsubUsers();
  if(unsubPreds)unsubPreds();
  if(unsubResults)unsubResults();
  unsubUsers=unsubPreds=unsubResults=null;
}

auth.onAuthStateChanged(async user=>{
  if(user){
    let snap=await db.collection('users').doc(user.uid).get();
    let tries=0;
    while(!snap.exists&&tries<6){
      await new Promise(r=>setTimeout(r,300));
      snap=await db.collection('users').doc(user.uid).get();
      tries++;
    }
    currentUser={id:user.uid,email:user.email,...(snap.exists?snap.data():{name:user.email.split('@')[0],color:COLORS[0]})};
    document.getElementById('authOverlay').classList.add('hidden');
    document.getElementById('mainHeader').style.display='';
    document.getElementById('mainApp').style.display='';
    attachDataListeners();
  }else{
    currentUser=null;
    detachDataListeners();
    friends=[];preds={};results={};
    document.getElementById('authOverlay').classList.remove('hidden');
    document.getElementById('mainHeader').style.display='none';
    document.getElementById('mainApp').style.display='none';
    document.getElementById('authForm').reset();
    renderAll();
  }
});

  const days={};

  const DAYNAMES={

  };

  let html='';
  Object.entries(days).forEach(([d,matches])=>{
    const dayNum=parseInt(d.match(/(\d+)/)[1],10);
    html+=`<div class="day-block" id="day-${dayNum}">

        <span class="day-name">${DAYNAMES[d]||d}</span>

      </div>`;
    matches.forEach(m=>{html+=renderCard(m,af)});
    html+='</div>';
  });
  cont.innerHTML=html;
}

function renderCard(m,af){
  const r={h:'',a:'',...(results[m.id]||{})};
  const hasResult=r.h!==''&&r.a!=='';
  const fh=FLAGS[m.home]||'🏳️';
  const fa=FLAGS[m.away]||'🏳️';

  // preds chips for all friends
  let chips='';
  friends.forEach(f=>{
    const p=preds[m.id]?.[f.id];
    const hasPred=p&&p.h!==''&&p.a!=='';
    const pts=calcPts(m.id,f.id);
    let cls='';
    if(pts===3)cls='hit-exact';
    else if(pts===1)cls='hit-win';
    else if(pts===0&&hasResult)cls='miss';
    chips+=`<div class="pred-chip ${cls}">
      <div class="chip-avatar" style="background:${f.color}">${f.name[0].toUpperCase()}</div>
      <span style="font-weight:700">${f.name}</span>
      ${hasPred?`<span class="chip-score">${p.h}-${p.a}</span>`:'<span class="chip-none">—</span>'}
      ${pts===3?'<span class="chip-pts p3">+3</span>':''}
      ${pts===1?'<span class="chip-pts p1">+1</span>':''}
    </div>`;
  });

  // active friend pred inputs — editable + "Guardar" until locked, then read-only forever
  const savedPred=af?preds[m.id]?.[af.id]:null;
  const isLocked=!!savedPred;
  const draft=drafts[m.id]||{h:'',a:''};
  const canSave=draft.h!==''&&draft.a!=='';

  const predBlock=!af?'':isLocked?`
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="real-block">
        <div class="real-score-line">
          <span class="rs">${savedPred.h}</span><span class="rs-dash">-</span><span class="rs">${savedPred.a}</span>
        </div>
      </div>
      <div class="score-type-label" style="color:${af.color};opacity:.8">🔒 ${af.name}</div>
    </div>`:`
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="score-inputs">
        <input class="s-input" type="number" min="0" max="99" value="${draft.h}" placeholder="—"
          oninput="updateDraft(${m.id},'h',this.value)">
        <span class="s-dash">—</span>
        <input class="s-input" type="number" min="0" max="99" value="${draft.a}" placeholder="—"
          oninput="updateDraft(${m.id},'a',this.value)">
      </div>
      <button id="save-btn-${m.id}" class="btn-save-pred" ${canSave?'':'disabled'} onclick="confirmPred(${m.id})">Guardar</button>
      <div class="score-type-label" style="color:${af.color};opacity:.8">${af.name}</div>
    </div>`;

  const isAdmin=currentUser&&currentUser.id===ADMIN_UID;
  const realBlock=isAdmin?`
        <div class="real-inputs">
            <input class="ri" type="number" min="0" max="99" value="${r.h}" placeholder="?"
              oninput="saveResult(${m.id},'h',this.value)">
            <span class="ri-dash">-</span>
            <input class="ri" type="number" min="0" max="99" value="${r.a}" placeholder="?"
              oninput="saveResult(${m.id},'a',this.value)">
          </div>`:`
        <div class="real-block">
          <div class="real-score-line">
            <span class="rs">${hasResult?r.h:'?'}</span><span class="rs-dash">-</span><span class="rs">${hasResult?r.a:'?'}</span>
          </div>
        </div>`;

  return`<div class="match-card ${hasResult?'settled':''}" id="mc${m.id}">
    <div class="match-top">
      <span class="match-group-tag">${m.group}</span>
      <span class="match-time">🕐 ${m.time}</span>
    </div>
    <div class="match-body">
      <div class="team-side">
        <span class="team-flag">${fh}</span>
        <div class="team-info"><div class="team-name">${m.home}</div></div>
      </div>
      <div class="center-zone">
        ${predBlock}
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:${af?'6px':'0'}">
          ${realBlock}
          <div class="score-type-label">Resultado real</div>
        </div>
      </div>
      <div class="team-side right">
        <span class="team-flag">${fa}</span>
        <div class="team-info"><div class="team-name">${m.away}</div></div>
      </div>
    </div>
    ${friends.length?`<div class="preds-row">${chips}</div>`:''}
  </div>`;
}

function updateDraft(mid,side,val){
  if(!drafts[mid])drafts[mid]={h:'',a:''};
  drafts[mid][side]=val;
  const btn=document.getElementById('save-btn-'+mid);
  if(btn)btn.disabled=!(drafts[mid].h!==''&&drafts[mid].a!=='');
}

function confirmPred(mid){
  if(!currentUser)return;
  const d=drafts[mid]||{h:'',a:''};
  if(d.h===''||d.a===''){alert('Pon un marcador para los dos equipos antes de guardar.');return;}
  const docId=`${mid}_${currentUser.id}`;
  db.collection('predictions').doc(docId).set({matchId:mid,uid:currentUser.id,h:d.h,a:d.a,locked:true})
    .then(()=>{delete drafts[mid]})
    .catch(err=>{console.error('Save pred error:',err);alert('No se pudo guardar. Intenta de nuevo.')});
}

function saveResult(mid,side,val){
  if(!currentUser||currentUser.id!==ADMIN_UID)return;
  db.collection('results').doc(String(mid)).set({[side]:val},{merge:true});
}

function renderLeaderboard(){
  const el=document.getElementById('leaderboard');
  if(!friends.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🏆</div><div class="empty-msg">Agrega participantes para ver la tabla</div></div>';
    return;
  }
  const ranked=friends.map(f=>({...f,...totals(f.id)})).sort((a,b)=>b.pts-a.pts||b.ex-a.ex);
  const medals=['🥇','🥈','🥉'];
  const top3=ranked.slice(0,3);
  const rest=ranked.slice(3);

  // podium order: 2nd, 1st, 3rd
  const podiumOrder=top3.length===3?[top3[1],top3[0],top3[2]]:top3;

  const podiumHTML=top3.length?`<div class="lb-podium">`+
    (top3.length===3?podiumOrder:[top3[0]]).map((f,pi)=>{
      const isFirst=f===top3[0];
      return`<div class="podium-card ${isFirst?'p1':f===top3[1]?'p2':'p3'}">
        <div class="podium-medal">${isFirst?medals[0]:f===top3[1]?medals[1]:medals[2]}</div>
        <div class="podium-avatar" style="background:${f.color}">${f.name[0].toUpperCase()}</div>
        <div class="podium-name">${f.name}</div>
        <div class="podium-pts">${f.pts}</div>
        <div class="podium-pts-label">puntos</div>
        <div class="podium-detail">${f.ex} exacto · ${f.win} ganador</div>
      </div>`;
    }).join('')+`</div>`:''

  const restHTML=rest.length?`<div class="lb-list">`+
    rest.map((f,i)=>`
      <div class="lb-row">
        <div class="lb-rank">${i+4}</div>
        <div class="lb-av" style="background:${f.color}">${f.name[0].toUpperCase()}</div>
        <div><div class="lb-name">${f.name}</div><div class="lb-sub">${f.ex} exacto · ${f.win} ganador</div></div>
        <div class="lb-score">${f.pts}</div>
      </div>`).join('')+`</div>`:''

  el.innerHTML=podiumHTML+restHTML;
}

function renderCalendar(){
  const el=document.getElementById('calendarGrid');
  if(!el)return;
  const year=2026,month=5; // Junio 2026
  const firstDow=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const isThisMonth=today.getFullYear()===year&&today.getMonth()===month;
  const todayNum=today.getDate();

  const matchDays={};
  MATCHES.forEach(m=>{
    const d=parseInt(m.date.match(/(\d+)/)[1],10);
    matchDays[d]=(matchDays[d]||0)+1;
  });

  const WD=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let html=`<div class="cal-title">Junio 2026</div>
    <div class="cal-weekdays">${WD.map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div>
    <div class="cal-grid">`;
  for(let i=0;i<firstDow;i++)html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const count=matchDays[d]||0;
    const has=count>0;
    const isToday=isThisMonth&&d===todayNum;
    html+=`<div class="cal-cell ${has?'has-matches':'no-matches'} ${isToday?'is-today':''}" ${has?`onclick="goToDay(${d})"`:''}>
      ${isToday?'<div class="cal-today-badge">HOY</div>':''}
      <div class="cal-daynum">${d}</div>
      ${has?`<div class="cal-count">${count} ${count>1?'partidos':'partido'}</div>`:''}
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function goToDay(d){
  document.querySelectorAll('.tab-panel').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.htab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-partidos').classList.add('active');
  const partidosBtn=document.querySelector('.htab[data-tab="partidos"]');
  if(partidosBtn)partidosBtn.classList.add('active');
  setTimeout(()=>{
    const el=document.getElementById('day-'+d);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },60);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.htab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='tabla') renderLeaderboard();
  if(name==='calendario') renderCalendar();
}

function renderAll(){renderUserBox();renderPlayers();renderMatches();renderLeaderboard();renderCalendar()}
renderAll();
</script>
