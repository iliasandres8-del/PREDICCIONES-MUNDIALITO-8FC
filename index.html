<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 · Predicciones</title>

<!-- PWA: permite instalar esta página como app en el celular -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#4f46e5">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mundial 2026">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f9;
  --bg-grad:linear-gradient(160deg,#eef0f8 0%,#e7e9f5 45%,#eef0f8 100%);
  --surface:#ffffff;
  --surface-soft:#f8f9fd;
  --surface-alt:#f0f1f9;
  --border:#e4e6f0;
  --border-strong:#d4d7e8;
  --text:#161826;
  --text-soft:#454a5e;
  --muted:#868ca3;
  --muted2:#a3a8bd;

  --primary:#4f46e5;
  --primary-dark:#4338ca;
  --primary-soft:#eef0fe;
  --primary-glow:rgba(79,70,229,0.16);

  --gold:#b8860b;
  --gold-bg:#fff7e0;
  --gold-text:#8a6308;
  --gold-border:#f1d98a;

  --green:#16a34a;
  --green-bg:#e9f9ee;
  --green-text:#0f7a37;
  --green-border:#a9e8be;

  --red:#dc2626;
  --red-bg:#fdecec;
  --red-text:#b91c1c;
  --red-border:#f3b8b8;

  --shadow-sm:0 1px 2px rgba(20,22,40,0.04);
  --shadow-md:0 4px 16px rgba(20,22,40,0.06);
  --shadow-lg:0 12px 32px rgba(20,22,40,0.10);
  --shadow-glow:0 0 0 4px var(--primary-glow);

  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:18px;
  --radius-pill:999px;

  --font:'Inter',system-ui,sans-serif;
  --display:'Sora',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}

html,body{
  background:var(--bg-grad);
  background-attachment:fixed;
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:var(--display)}
button{font-family:inherit}
input{font-family:inherit}

/* ═══════════ AUTH SCREEN ═══════════ */
.auth-overlay{
  position:fixed;inset:0;z-index:1000;
  background:
    radial-gradient(circle at 15% 10%, rgba(79,70,229,0.10), transparent 45%),
    radial-gradient(circle at 85% 90%, rgba(184,134,11,0.08), transparent 45%),
    var(--bg-grad);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.auth-overlay.hidden{display:none}
.auth-card{
  width:100%;max-width:420px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:40px 36px;
  box-shadow:var(--shadow-lg);
}
.auth-emblem{
  width:60px;height:60px;margin:0 auto 20px;
  border-radius:18px;
  background:linear-gradient(135deg,var(--primary),#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:15px;font-weight:800;letter-spacing:.02em;
  color:#fff;
  box-shadow:0 8px 20px rgba(79,70,229,0.35);
}
.auth-title{font-size:26px;font-weight:800;text-align:center;color:var(--text);letter-spacing:-.01em}
.auth-sub{font-size:14px;color:var(--muted);text-align:center;margin-top:6px;margin-bottom:28px}
.auth-field{margin-bottom:16px}
.auth-label{font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:7px;display:block}
.auth-input{
  width:100%;background:var(--surface-soft);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);font-size:15px;
  padding:12px 14px;outline:none;
  transition:border-color .15s, box-shadow .15s, background .15s;
}
.auth-input:focus{border-color:var(--primary);background:var(--surface);box-shadow:var(--shadow-glow)}
.auth-input::placeholder{color:var(--muted2)}
.auth-btn{
  width:100%;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border:none;border-radius:var(--radius-sm);
  color:#fff;font-weight:700;font-size:15px;
  padding:13px;cursor:pointer;margin-top:8px;
  transition:opacity .15s, transform .1s;
  box-shadow:0 6px 16px rgba(79,70,229,0.30);
}
.auth-btn:hover{opacity:.92}
.auth-btn:active{transform:scale(.98)}
.auth-btn:disabled{opacity:.5;cursor:default;box-shadow:none}
.auth-switch{text-align:center;font-size:14px;color:var(--muted);margin-top:22px}
.auth-switch a{color:var(--primary);cursor:pointer;font-weight:700;text-decoration:none}
.auth-switch a:hover{text-decoration:underline}
.auth-error{
  background:var(--red-bg);border:1px solid var(--red-border);
  color:var(--red-text);font-size:13px;font-weight:500;
  border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:16px;display:none;
}
.auth-error.show{display:block}

/* ═══════════ HEADER ═══════════ */
.header{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.header-inner{
  max-width:1440px;margin:0 auto;padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  height:68px;gap:16px;
}
.logo{display:flex;align-items:center;gap:13px;min-width:0}
.logo-emblem{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:11px;font-weight:800;color:#fff;
  box-shadow:0 4px 12px rgba(79,70,229,0.30);
}
.logo-top{font-family:var(--display);font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.01em;line-height:1.15;white-space:nowrap}
.logo-sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px;white-space:nowrap}
.header-tabs{display:flex;gap:3px;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-pill);padding:4px;flex-shrink:0}
.htab{
  padding:9px 18px;border-radius:var(--radius-pill);
  font-size:13.5px;font-weight:700;
  cursor:pointer;border:none;background:none;color:var(--muted);
  transition:all .2s; white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.htab:hover{color:var(--text)}
.htab.active{background:var(--surface);color:var(--primary);box-shadow:var(--shadow-sm)}
.header-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.live-clock{
  display:none;align-items:center;gap:8px;
  background:var(--surface-alt);border:1px solid var(--border);
  border-radius:var(--radius-pill);padding:7px 14px;
  font-family:var(--mono);font-size:12.5px;color:var(--text-soft);font-weight:500;
}
.live-clock .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-bg);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══════════ LAYOUT ═══════════ */
.app-layout{display:grid;grid-template-columns:280px 1fr;max-width:1440px;margin:0 auto;min-height:calc(100vh - 68px)}
.sidebar{
  border-right:1px solid var(--border);
  padding:24px 18px;position:sticky;top:68px;
  height:calc(100vh - 68px);overflow-y:auto;
  display:flex;flex-direction:column;gap:22px;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.main-area{padding:28px 32px}

.s-section-label{
  font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}

/* user box */
.user-box{
  display:flex;align-items:center;gap:11px;
  padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-md);
  background:var(--surface);box-shadow:var(--shadow-sm);
}
.user-box-name{flex:1;font-size:14.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.admin-chip{
  font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  background:var(--gold-bg);color:var(--gold-text);border:1px solid var(--gold-border);
  border-radius:5px;padding:2px 6px;flex-shrink:0;
}
.logout-btn{
  background:var(--surface-alt);border:1px solid var(--border);color:var(--muted);
  font-size:12px;font-weight:700;padding:7px 11px;border-radius:var(--radius-sm);
  cursor:pointer;flex-shrink:0;transition:all .15s;
}
.logout-btn:hover{color:var(--red-text);border-color:var(--red-border);background:var(--red-bg)}

/* players */
.player-card{
  display:flex;align-items:center;gap:11px;
  padding:11px 13px;border-radius:var(--radius-md);border:1.5px solid var(--border);
  background:var(--surface);transition:all .2s;position:relative;margin-bottom:7px;
}
.player-card:last-child{margin-bottom:0}
.player-card.active{border-color:var(--primary);background:var(--primary-soft);box-shadow:0 0 0 3px var(--primary-glow)}
.player-avatar{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;flex-shrink:0;color:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.player-name{flex:1;font-size:14px;font-weight:700;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-pts{
  font-family:var(--mono);font-size:12px;font-weight:700;color:var(--primary);
  padding:3px 9px;background:var(--primary-soft);border-radius:var(--radius-pill);flex-shrink:0;
}
.no-players{text-align:center;padding:20px 10px;color:var(--muted);font-size:13px}

.player-row-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px}
.player-manual-tag{
  font-family:var(--mono);font-size:10.5px;font-weight:700;
  color:var(--gold-text);background:var(--gold-bg);border:1px solid var(--gold-border);
  border-radius:var(--radius-sm);padding:2px 7px;
}
.btn-edit-pts{
  background:var(--surface-alt);border:1px solid var(--border);color:var(--muted);
  font-size:11px;font-weight:700;padding:4px 9px;border-radius:var(--radius-sm);
  cursor:pointer;transition:all .15s; flex-shrink:0;
}
.btn-edit-pts:hover{color:var(--primary);border-color:var(--primary);background:var(--primary-soft)}
.edit-pts-form{display:flex;align-items:center;gap:6px;margin-top:8px}
.edit-pts-input{
  width:64px;text-align:center;font-family:var(--mono);font-size:13px;font-weight:700;
  background:var(--surface-soft);border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);
  color:var(--text);padding:6px 4px;outline:none;
}
.edit-pts-input:focus{border-color:var(--primary)}
.btn-edit-save{
  background:var(--primary);border:none;border-radius:var(--radius-sm);color:#fff;
  font-size:11px;font-weight:700;padding:6px 10px;cursor:pointer;
}
.btn-edit-cancel{
  background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);
  font-size:11px;font-weight:700;padding:6px 10px;cursor:pointer;
}

/* scoring box */
.score-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 16px;box-shadow:var(--shadow-sm)}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13.5px;color:var(--text-soft);font-weight:500}
.score-row:last-child{margin-bottom:0}
.badge-pts{font-family:var(--mono);font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:var(--radius-sm)}
.badge-exact{background:var(--gold-bg);color:var(--gold-text);border:1px solid var(--gold-border)}
.badge-win{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}
.badge-zero{background:var(--surface-alt);color:var(--muted);border:1px solid var(--border)}

/* ═══════════ TABS CONTENT ═══════════ */
.tab-panel{display:none}
.tab-panel.active{display:block; animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* day group */
.day-block{margin-bottom:30px}
.day-header{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
  padding:13px 18px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  box-shadow:var(--shadow-sm);
}
.day-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:16px;
}
.day-name{font-family:var(--display);font-size:16.5px;font-weight:700;color:var(--text)}
.day-sub{font-size:12px;color:var(--muted);font-weight:500}
.day-count{
  font-size:11.5px;color:var(--muted);margin-left:auto;font-weight:600;
  background:var(--surface-alt);padding:4px 11px;border-radius:var(--radius-pill);
}

/* ═══════════ MATCH CARD ═══════════ */
.match-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;
  transition:all .2s; box-shadow:var(--shadow-sm);
}
.match-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-strong)}
.match-card.settled{border-left:4px solid var(--green)}
.match-card.locked-pending{border-left:4px solid var(--muted2)}

.match-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 18px;border-bottom:1px solid var(--border);
  background:var(--surface-soft);
}
.match-group-tag{
  font-size:11px;font-weight:800;letter-spacing:.04em;
  text-transform:uppercase;padding:4px 12px;border-radius:var(--radius-pill);
  background:var(--primary-soft);color:var(--primary);
}
.match-time-wrap{display:flex;align-items:center;gap:7px}
.match-time{font-family:var(--mono);font-size:12.5px;color:var(--text-soft);font-weight:600}
.match-time-icon{font-size:12px}
.match-status{
  font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 9px;border-radius:var(--radius-pill);
}
.status-live{background:var(--red-bg);color:var(--red-text);animation:pulse 1.6s infinite}
.status-closed{background:var(--surface-alt);color:var(--muted)}
.status-open{background:var(--green-bg);color:var(--green-text)}

.match-body{display:flex;align-items:center;padding:20px 18px}
.team-side{flex:1;display:flex;align-items:center;gap:13px;min-width:0}
.team-side.right{flex-direction:row-reverse;text-align:right}
.team-flag{font-size:34px;line-height:1;flex-shrink:0}
.team-name{font-family:var(--display);font-size:17.5px;font-weight:700;color:var(--text);letter-spacing:-.01em;line-height:1.2}

.center-zone{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 18px;min-width:170px}

.score-inputs{display:flex;align-items:center;gap:7px}
.s-input{
  width:46px;height:46px;text-align:center;
  font-family:var(--mono);font-size:21px;font-weight:700;
  background:var(--surface-soft);border:1.5px solid var(--border-strong);
  border-radius:var(--radius-sm);color:var(--text);outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.s-input:focus{border-color:var(--primary);box-shadow:var(--shadow-glow)}
.s-input::-webkit-outer-spin-button,.s-input::-webkit-inner-spin-button{-webkit-appearance:none}
.s-dash{font-family:var(--mono);font-size:16px;color:var(--muted2);font-weight:700}
.score-type-label{font-size:10.5px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;text-align:center;font-weight:700}

.btn-save-pred{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border:none;border-radius:var(--radius-sm);color:#fff;font-weight:700;font-size:12px;
  padding:7px 18px;cursor:pointer;margin-top:2px;transition:opacity .15s, transform .1s;
  box-shadow:0 4px 12px rgba(79,70,229,0.28);
}
.btn-save-pred:hover{opacity:.9}
.btn-save-pred:active{transform:scale(.97)}
.btn-save-pred:disabled{opacity:.35;cursor:default;box-shadow:none}

.real-block{
  background:var(--surface-alt);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:7px 16px;text-align:center;min-width:90px;
}
.real-score-line{display:flex;align-items:center;gap:8px;justify-content:center}
.rs{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--text);width:22px;text-align:center}
.rs-dash{color:var(--muted2);font-family:var(--mono);font-weight:700}
.real-inputs{display:flex;align-items:center;gap:5px;justify-content:center}
.ri{
  width:40px;height:40px;text-align:center;
  font-family:var(--mono);font-size:17px;font-weight:700;
  background:var(--surface);border:1.5px solid var(--green-border);
  border-radius:var(--radius-sm);color:var(--text);outline:none;
  transition:border-color .15s;
}
.ri:focus{border-color:var(--green)}
.ri::-webkit-outer-spin-button,.ri::-webkit-inner-spin-button{-webkit-appearance:none}

/* locked pred */
.locked-pred-box{
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.locked-score{
  background:linear-gradient(135deg,var(--primary-soft),#f3effe);
  border:1.5px solid var(--primary);border-radius:var(--radius-sm);
  padding:7px 16px;display:flex;align-items:center;gap:8px;
}
.locked-score .rs{color:var(--primary-dark)}
.lock-icon{font-size:11px}

/* closed-no-pred */
.closed-empty{
  background:var(--surface-alt);border:1.5px dashed var(--border-strong);
  border-radius:var(--radius-sm);padding:7px 16px;color:var(--muted);
  font-family:var(--mono);font-size:14px;text-align:center;min-width:90px;
}

/* ═══════════ PRED CHIPS ═══════════ */
.preds-row{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:13px 18px;border-top:1px solid var(--border);
  background:var(--surface-soft);
}
.pred-chip{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:var(--radius-pill);
  border:1.5px solid var(--border);background:var(--surface);
  font-size:12.5px;font-weight:600;color:var(--text-soft);
  transition:all .15s;
}
.pred-chip.hit-exact{border-color:var(--gold-border);background:var(--gold-bg);color:var(--gold-text)}
.pred-chip.hit-win{border-color:var(--green-border);background:var(--green-bg);color:var(--green-text)}
.pred-chip.miss{opacity:.55}
.chip-avatar{
  width:19px;height:19px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;flex-shrink:0;
}
.chip-score{font-family:var(--mono);font-size:12px;font-weight:600}
.chip-pts{font-family:var(--mono);font-size:10.5px;font-weight:800;padding:1.5px 6px;border-radius:5px}
.chip-pts.p3{background:var(--gold-text);color:#fff}
.chip-pts.p1{background:var(--green-text);color:#fff}
.chip-none{color:var(--muted2);font-size:12px;font-family:var(--mono)}

/* active user banner */
.active-pill{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-pill);padding:9px 18px 9px 9px;font-size:13.5px;font-weight:600;
  color:var(--text-soft);margin-bottom:22px;box-shadow:var(--shadow-sm);
}
.active-pill strong{color:var(--primary);font-weight:800}
.active-pill .avatar-mini{
  width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;
}

/* ═══════════ LEADERBOARD ═══════════ */
.lb-wrap{max-width:680px}
.lb-podium{display:grid;grid-template-columns:1fr 1.12fr 1fr;gap:14px;margin-bottom:28px;align-items:end}
.podium-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);padding:22px 14px;text-align:center;
  transition:all .2s; box-shadow:var(--shadow-sm); position:relative; overflow:hidden;

let friends=[];
let results={};
let preds={};
let drafts={};
let currentUser=null;
let unsubUsers=null, unsubPreds=null, unsubResults=null;

function winner(h,a){return h>a?'H':a>h?'A':'D'}

function isEmpty(v){
  return v===''||v===null||v===undefined;
}

// Devuelve true si el partido ya inició (hora actual >= hora de inicio en Colombia).
// Bloquea que cualquiera (menos el admin) pueda seguir creando o editando
// su predicción una vez arrancó el partido. Esto se valida tanto en el
// render (visual) como dentro de confirmPred (a nivel de datos).
function hasMatchStarted(m){
  if(!m.kickoffCO) return false;
  return Date.now() >= new Date(m.kickoffCO).getTime();
}

function calcPts(mid,fid){
  const r=results[mid],p=preds[mid]?.[fid];
  if(!r||!p) return null;
  if(isEmpty(r.h)||isEmpty(r.a)||isEmpty(p.h)||isEmpty(p.a)) return null;
  if(+p.h===+r.h&&+p.a===+r.a) return 3;
  if(winner(+p.h,+p.a)===winner(+r.h,+r.a)) return 1;
  return 0;
}
function totals(fid){
  let pts=0,ex=0,win=0;
  MATCHES.forEach(m=>{const p=calcPts(m.id,fid);if(p===3){pts+=3;ex++}else if(p===1){pts+=1;win++}});
  const f=friends.find(x=>x.id===fid);
  const manual=f&&typeof f.manualAdjust==='number'?f.manualAdjust:0;
  return{pts:pts+manual,ex,win,manual};
}

}

  const btn=document.getElementById('authSubmitBtn');
  btn.disabled=true;
  try{
    if(authMode==='register'){
      if(!name){showAuthError('Escribe tu nombre');btn.disabled=false;return false}
      const cred=await auth.createUserWithEmailAndPassword(email,password);
      const color=await getNextColor();
      await db.collection('users').doc(cred.user.uid).set({
        name,color,email,createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }else{
      await auth.signInWithEmailAndPassword(email,password);
    }
  }catch(err){
    console.error('Auth error:',err);
    showAuthError(translateAuthError(err.code));
  }
  btn.disabled=false;
  return false;
}

function handleLogout(){auth.signOut()}

function attachDataListeners(){
  unsubUsers=db.collection('users').onSnapshot(snap=>{
    friends=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    renderAll();
  });
  unsubPreds=db.collection('predictions').onSnapshot(snap=>{
    const np={};
    snap.forEach(doc=>{
      const d=doc.data();
      if(!np[d.matchId])np[d.matchId]={};
      np[d.matchId][d.uid]={h:d.h,a:d.a};
    });
    preds=np;
    renderAll();
  });
  unsubResults=db.collection('results').onSnapshot(snap=>{
    const nr={};
    snap.forEach(doc=>{nr[doc.id]=doc.data()});
    results=nr;
    renderAll();
  });
}

function detachDataListeners(){
  if(unsubUsers)unsubUsers();
  if(unsubPreds)unsubPreds();
  if(unsubResults)unsubResults();
  unsubUsers=unsubPreds=unsubResults=null;
}

auth.onAuthStateChanged(async user=>{
  if(user){
    let snap=await db.collection('users').doc(user.uid).get();
    let tries=0;
    while(!snap.exists&&tries<6){
      await new Promise(r=>setTimeout(r,300));
      snap=await db.collection('users').doc(user.uid).get();
      tries++;
    }
    currentUser={id:user.uid,email:user.email,...(snap.exists?snap.data():{name:user.email.split('@')[0],color:COLORS[0]})};
    document.getElementById('authOverlay').classList.add('hidden');
    document.getElementById('mainHeader').style.display='';
    document.getElementById('mainApp').style.display='';
    attachDataListeners();
  }else{
    currentUser=null;
    detachDataListeners();
    friends=[];preds={};results={};
    document.getElementById('authOverlay').classList.remove('hidden');
    document.getElementById('mainHeader').style.display='none';
    document.getElementById('mainApp').style.display='none';
    document.getElementById('authForm').reset();
    renderAll();
  }
});

function renderUserBox(){
  const el=document.getElementById('userBox');
  if(!el||!currentUser)return;
  const isAdminUser=currentUser.id===ADMIN_UID;
  el.innerHTML=`<div class="user-box">
    <div class="player-avatar" style="background:${currentUser.color}">${currentUser.name[0].toUpperCase()}</div>
    <div class="user-box-name">${currentUser.name}</div>
    ${isAdminUser?'<span class="admin-chip">Admin</span>':''}
    <button class="logout-btn" onclick="handleLogout()">Salir</button>
  </div>`;
}

let editingPtsFor=null;

function renderPlayers(){
  const el=document.getElementById('playerList');
  if(!friends.length){
    el.innerHTML='<div class="no-players">Cargando participantes...</div>';
    return;
  }
  const isAdmin=currentUser&&currentUser.id===ADMIN_UID;
  el.innerHTML=friends.map(f=>{
      const{pts,manual}=totals(f.id);
      const isMe=currentUser&&f.id===currentUser.id;
      const isEditing=editingPtsFor===f.id;
      return`<div class="player-card ${isMe?'active':''}">
        <div class="player-avatar" style="background:${f.color}">${f.name[0].toUpperCase()}</div>
        <div class="player-name">${f.name}${isMe?' (tú)':''}</div>
        <div class="player-pts">${pts}p</div>
      </div>
      ${isAdmin?`<div class="player-row-bottom">
        ${manual?`<span class="player-manual-tag">ajuste ${manual>0?'+':''}${manual}</span>`:'<span></span>'}
        <button class="btn-edit-pts" onclick="toggleEditPts('${f.id}')">✏️ Editar puntos</button>
      </div>
      ${isEditing?`<div class="edit-pts-form">
        <input class="edit-pts-input" id="edit-pts-input-${f.id}" type="number" value="${manual}" placeholder="0">
        <button class="btn-edit-save" onclick="saveManualAdjust('${f.id}')">Guardar</button>
        <button class="btn-edit-cancel" onclick="toggleEditPts(null)">Cancelar</button>
      </div>`:''}`:''}`;
    }).join('');
}

function toggleEditPts(fid){
  editingPtsFor=editingPtsFor===fid?null:fid;
  renderPlayers();
}

function saveManualAdjust(fid){
  const input=document.getElementById('edit-pts-input-'+fid);
  const val=parseInt(input.value,10);
  const adjust=isNaN(val)?0:val;
  db.collection('users').doc(fid).set({manualAdjust:adjust},{merge:true})
    .then(()=>{editingPtsFor=null;})
    .catch(err=>{console.error('Error guardando ajuste:',err);alert('No se pudo guardar el ajuste. Intenta de nuevo.');});
}

const DAYNAMES={
  'Sáb 20 Jun':'Sábado 20 de Junio',
  'Dom 21 Jun':'Domingo 21 de Junio',
  'Lun 22 Jun':'Lunes 22 de Junio',
  'Mar 23 Jun':'Martes 23 de Junio',
  'Mié 24 Jun':'Miércoles 24 de Junio',
  'Jue 25 Jun':'Jueves 25 de Junio',
  'Vie 26 Jun':'Viernes 26 de Junio',
  'Sáb 27 Jun':'Sábado 27 de Junio',
};

function renderMatches(){
  const cont=document.getElementById('matchList');
  const ind=document.getElementById('activeIndicator');
  const af=currentUser;

  if(!friends.length){
    ind.innerHTML='';
    cont.innerHTML='<div class="empty"><div class="empty-icon">⚽</div><div class="empty-msg">Cargando partidos...</div><div class="empty-sub">Un momento</div></div>';
    return;
  }

  ind.innerHTML=af?`<div class="active-pill"><div class="avatar-mini" style="background:${af.color}">${af.name[0].toUpperCase()}</div>Prediciendo como <strong>${af.name}</strong></div>`:'';

  const days={};
  MATCHES.forEach(m=>{if(!days[m.date])days[m.date]=[];days[m.date].push(m)});

  let html='';
  Object.entries(days).forEach(([d,matches])=>{
    const dayNum=parseInt(d.match(/(\d+)/)[1],10);
    const liveCount=matches.filter(m=>hasMatchStarted(m)&&!results[m.id]).length;
    html+=`<div class="day-block" id="day-${dayNum}">
      <div class="day-header">
        <div class="day-icon">📅</div>
        <div>
          <div class="day-name">${DAYNAMES[d]||d}</div>
          <div class="day-sub">Hora Colombia (UTC-5)</div>
        </div>
        <span class="day-count">${matches.length} partido${matches.length>1?'s':''}</span>
      </div>`;
    matches.forEach(m=>{html+=renderCard(m,af)});
    html+='</div>';
  });
  cont.innerHTML=html;
}

function matchStatusBadge(m,hasResult){
  if(hasResult) return `<span class="match-status status-closed">Finalizado</span>`;
  if(hasMatchStarted(m)) return `<span class="match-status status-live">● En vivo</span>`;
  return `<span class="match-status status-open">Abierto</span>`;
}

function renderCard(m,af){
  const r={h:'',a:'',...(results[m.id]||{})};
  const hasResult=!isEmpty(r.h)&&!isEmpty(r.a);
  const fh=FLAGS[m.home]||'🏳️';
  const fa=FLAGS[m.away]||'🏳️';
  const started=hasMatchStarted(m);

  let chips='';
  friends.forEach(f=>{
    const p=preds[m.id]?.[f.id];
    const hasPred=p&&!isEmpty(p.h)&&!isEmpty(p.a);
    const pts=calcPts(m.id,f.id);
    let cls='';
    if(pts===3)cls='hit-exact';
    else if(pts===1)cls='hit-win';
    else if(pts===0&&hasResult)cls='miss';
    chips+=`<div class="pred-chip ${cls}">
      <div class="chip-avatar" style="background:${f.color}">${f.name[0].toUpperCase()}</div>
      <span style="font-weight:700">${f.name}</span>
      ${hasPred?`<span class="chip-score">${p.h}-${p.a}</span>`:'<span class="chip-none">—</span>'}
      ${pts===3?'<span class="chip-pts p3">+3</span>':''}
      ${pts===1?'<span class="chip-pts p1">+1</span>':''}
    </div>`;
  });

  const savedPredRaw=af?preds[m.id]?.[af.id]:null;
  const savedPred=(savedPredRaw&&!isEmpty(savedPredRaw.h)&&!isEmpty(savedPredRaw.a))?savedPredRaw:null;
  const isLocked=!!savedPred;
  const draft=drafts[m.id]||{h:'',a:''};
  const canSave=draft.h!==''&&draft.a!=='';

  const predBlock=!af?'':isLocked?`
    <div class="locked-pred-box">
      <div class="locked-score">
        <span class="rs">${savedPred.h}</span><span class="rs-dash">-</span><span class="rs">${savedPred.a}</span>
      </div>
      <div class="score-type-label" style="color:${af.color}"><span class="lock-icon">🔒</span> ${af.name}</div>
    </div>`:started?`
    <div class="locked-pred-box">
      <div class="closed-empty">— · —</div>
      <div class="score-type-label" style="color:var(--red-text)">⏱ Cerrado</div>
    </div>`:`
    <div class="locked-pred-box">
      <div class="score-inputs">
        <input class="s-input" type="number" min="0" max="99" value="${draft.h}" placeholder="0"
          oninput="updateDraft(${m.id},'h',this.value)">
        <span class="s-dash">—</span>
        <input class="s-input" type="number" min="0" max="99" value="${draft.a}" placeholder="0"
          oninput="updateDraft(${m.id},'a',this.value)">
      </div>
      <button id="save-btn-${m.id}" class="btn-save-pred" ${canSave?'':'disabled'} onclick="confirmPred(${m.id})">Guardar predicción</button>
      <div class="score-type-label" style="color:${af.color}">${af.name}</div>
    </div>`;

  const isAdmin=currentUser&&currentUser.id===ADMIN_UID;
  const realBlock=isAdmin?`
        <div class="real-inputs">
            <input class="ri" type="number" min="0" max="99" value="${isEmpty(r.h)?'':r.h}" placeholder="?"
              oninput="saveResult(${m.id},'h',this.value)">
            <span class="rs-dash">-</span>
            <input class="ri" type="number" min="0" max="99" value="${isEmpty(r.a)?'':r.a}" placeholder="?"
              oninput="saveResult(${m.id},'a',this.value)">
          </div>`:`
        <div class="real-block">
          <div class="real-score-line">
            <span class="rs">${hasResult?r.h:'?'}</span><span class="rs-dash">-</span><span class="rs">${hasResult?r.a:'?'}</span>
          </div>
        </div>`;

  return`<div class="match-card ${hasResult?'settled':(started?'locked-pending':'')}" id="mc${m.id}">
    <div class="match-top">
      <span class="match-group-tag">${m.group}</span>
      <div class="match-time-wrap">
        <span class="match-time"><span class="match-time-icon">🕐</span> ${m.time} Colombia</span>
        ${matchStatusBadge(m,hasResult)}
      </div>
    </div>
    <div class="match-body">
      <div class="team-side">
        <span class="team-flag">${fh}</span>
        <div class="team-name">${m.home}</div>
      </div>
      <div class="center-zone">
        ${predBlock}
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:${af?'8px':'0'}">
          ${realBlock}
          <div class="score-type-label">Resultado real</div>
        </div>
      </div>
      <div class="team-side right">
        <div class="team-name">${m.away}</div>
        <span class="team-flag">${fa}</span>
      </div>
    </div>
    ${friends.length?`<div class="preds-row">${chips}</div>`:''}
  </div>`;
}

function updateDraft(mid,side,val){
  if(!drafts[mid])drafts[mid]={h:'',a:''};
  drafts[mid][side]=val;
  const btn=document.getElementById('save-btn-'+mid);
  if(btn)btn.disabled=!(drafts[mid].h!==''&&drafts[mid].a!=='');
}

function confirmPred(mid){
  if(!currentUser)return;
  const m=MATCHES.find(x=>x.id===mid);
  if(m&&hasMatchStarted(m)){
    alert('Este partido ya inició, no se pueden guardar más predicciones.');
    renderMatches();
    return;
  }
  const d=drafts[mid]||{h:'',a:''};
  if(d.h===''||d.a===''){alert('Pon un marcador para los dos equipos antes de guardar.');return;}
  const docId=`${mid}_${currentUser.id}`;
  db.collection('predictions').doc(docId).set({matchId:mid,uid:currentUser.id,h:d.h,a:d.a,locked:true})
    .then(()=>{delete drafts[mid]})
    .catch(err=>{console.error('Save pred error:',err);alert('No se pudo guardar. Intenta de nuevo.')});
}

function saveResult(mid,side,val){
  if(!currentUser||currentUser.id!==ADMIN_UID)return;
  db.collection('results').doc(String(mid)).set({[side]:val===''?'':val},{merge:true});
}

function renderLeaderboard(){
  const el=document.getElementById('leaderboard');
  if(!friends.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🏆</div><div class="empty-msg">Agrega participantes para ver la tabla</div></div>';
    return;
  }
  const ranked=friends.map(f=>({...f,...totals(f.id)})).sort((a,b)=>b.pts-a.pts||b.ex-a.ex);
  const medals=['🥇','🥈','🥉'];
  const top3=ranked.slice(0,3);
  const rest=ranked.slice(3);

  const podiumOrder=top3.length===3?[top3[1],top3[0],top3[2]]:top3;

  const podiumHTML=top3.length?`<div class="lb-podium">`+
    (top3.length===3?podiumOrder:[top3[0]]).map((f)=>{
      const isFirst=f===top3[0];
      return`<div class="podium-card ${isFirst?'p1':f===top3[1]?'p2':'p3'}">
        <div class="podium-medal">${isFirst?medals[0]:f===top3[1]?medals[1]:medals[2]}</div>
        <div class="podium-avatar" style="background:${f.color}">${f.name[0].toUpperCase()}</div>
        <div class="podium-name">${f.name}</div>
        <div class="podium-pts">${f.pts}</div>
        <div class="podium-pts-label">Puntos</div>
        <div class="podium-detail">${f.ex} exacto · ${f.win} ganador</div>
      </div>`;
    }).join('')+`</div>`:''

  const restHTML=rest.length?`<div class="lb-list">`+
    rest.map((f,i)=>`
      <div class="lb-row">
        <div class="lb-rank">${i+4}</div>
        <div class="lb-av" style="background:${f.color}">${f.name[0].toUpperCase()}</div>
        <div><div class="lb-name">${f.name}</div><div class="lb-sub">${f.ex} exacto · ${f.win} ganador</div></div>
        <div class="lb-score">${f.pts}</div>
      </div>`).join('')+`</div>`:''

  el.innerHTML=podiumHTML+restHTML;
}

function renderCalendar(){
  const el=document.getElementById('calendarGrid');
  if(!el)return;
  const year=2026,month=5;
  const firstDow=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const isThisMonth=today.getFullYear()===year&&today.getMonth()===month;
  const todayNum=today.getDate();

  const matchDays={};
  MATCHES.forEach(m=>{
    const d=parseInt(m.date.match(/(\d+)/)[1],10);
    matchDays[d]=(matchDays[d]||0)+1;
  });

  const WD=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let html=`<div class="cal-title-row">
      <div class="cal-title">Junio 2026</div>
      <div class="cal-title-sub">Toca un día para ver sus partidos</div>
    </div>
    <div class="cal-weekdays">${WD.map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div>
    <div class="cal-grid">`;
  for(let i=0;i<firstDow;i++)html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const count=matchDays[d]||0;
    const has=count>0;
    const isToday=isThisMonth&&d===todayNum;
    html+=`<div class="cal-cell ${has?'has-matches':'no-matches'} ${isToday?'is-today':''}" ${has?`onclick="goToDay(${d})"`:''}>
      ${isToday?'<div class="cal-today-badge">HOY</div>':''}
      <div class="cal-daynum">${d}</div>
      ${has?`<div class="cal-count">${count} ${count>1?'partidos':'partido'}</div>`:''}
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function goToDay(d){
  document.querySelectorAll('.tab-panel').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.htab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-partidos').classList.add('active');
  const partidosBtn=document.querySelector('.htab[data-tab="partidos"]');
  if(partidosBtn)partidosBtn.classList.add('active');
  setTimeout(()=>{
    const el=document.getElementById('day-'+d);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },60);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.htab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='tabla') renderLeaderboard();
  if(name==='calendario') renderCalendar();
}

function updateLiveClock(){
  const el=document.getElementById('liveClockText');
  if(!el)return;
  const now=new Date();
  const txt=now.toLocaleTimeString('es-CO',{timeZone:'America/Bogota',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
  el.textContent=txt+' COL';
}

function renderAll(){renderUserBox();renderPlayers();renderMatches();renderLeaderboard();renderCalendar()}
renderAll();
updateLiveClock();
setInterval(updateLiveClock,1000);

// Cada 20s volvemos a pintar los partidos para que, en cuanto un partido
// arranque (según la hora de Colombia), el bloqueo aparezca solo sin
// que el usuario tenga que recargar la página.
setInterval(()=>{
  if(currentUser){
    renderMatches();
  }
},20000);

  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(err=>{
      console.warn('No se pudo registrar el service worker:',err);
    });
  });
}
